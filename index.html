<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#171126">
  <title>TarotBot Ã¢â‚¬â€ Reader Deck</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="matrixRain" class="matrix-rain" aria-hidden="true"></canvas>
  <main class="app-shell">
    <header class="app-header">
      <p class="eyebrow" id="appEyebrow">Digital tarot deck</p>
      <h1>TarotBot</h1>
      <p class="tagline" id="appTagline">Shuffle once. Draw without repeats.</p>
    </header>

    <section class="toolbar" aria-label="Deck settings">
      <label class="field">
        <span>Deck</span>
        <select id="deckSelector">
          <option value="emoji">Emoji</option>
          <option value="rider-waite">RiderÃ¢â‚¬â€œWaite</option>
          <option value="emoji-matrix">Matrix Emoji</option>
        </select>
      </label>

      <label class="switch-row">
        <input id="readerMode" type="checkbox" checked>
        <span>Reader mode</span>
      </label>

      <label class="switch-row">
        <input id="reversals" type="checkbox">
        <span>Include reversals</span>
      </label>
    </section>

    <section class="deck-area" aria-labelledby="deckStatus">
      <button id="cardButton" class="card-button" type="button" disabled aria-label="Draw a card">
        <span class="card" id="card">
          <span class="card-face card-back" aria-hidden="true">
            <span class="moon">Ã¢ËœÂ¾</span>
            <span class="card-prompt" id="cardPrompt">Loading deckÃ¢â‚¬Â¦</span>
          </span>
          <span class="card-face card-front" id="cardFront"></span>
        </span>
      </button>

      <p id="deckStatus" class="deck-status" role="status" aria-live="polite">Loading deckÃ¢â‚¬Â¦</p>

      <div class="actions">
        <button id="nextButton" class="button button-primary" type="button" disabled>Draw card</button>
        <button id="shuffleButton" class="button button-secondary" type="button" disabled>Return &amp; shuffle</button>
      </div>
    </section>

    <section id="meaningPanel" class="meaning-panel" hidden>
      <h2 id="meaningTitle">Card notes</h2>
      <p id="meaningKeywords" class="keywords"></p>
      <p id="meaningText"></p>
    </section>

    <section class="history-panel" aria-labelledby="historyTitle">
      <div class="history-heading">
        <div>
          <p class="eyebrow">This session</p>
          <h2 id="historyTitle">Drawn cards</h2>
        </div>
        <button id="historyToggle" class="text-button" type="button" aria-expanded="true" aria-controls="historyList">Hide</button>
      </div>
      <ol id="historyList" class="history-list">
        <li class="empty-history">No cards drawn yet.</li>
      </ol>
    </section>
  </main>

  <dialog id="shuffleDialog" class="shuffle-dialog">
    <form method="dialog">
      <h2>Return all cards?</h2>
      <p>This clears the current session and creates a fresh shuffled deck.</p>
      <div class="dialog-actions">
        <button class="button button-secondary" value="cancel">Cancel</button>
        <button class="button button-primary" value="confirm">Return &amp; shuffle</button>
      </div>
    </form>
  </dialog>

  <script src="reversed-interpretations.js"></script>
  <script src="app.js"></script>
</body>
</html>
